services:
  postgres:
    image: postgres:16-alpine
    container_name: sh-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4944
      POSTGRES_DB: shopdb
    ports:
      - '5432:5432'
    volumes:
      - sh_shop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d shopdb']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sh_shop_pgdata:
